name: experia
version: 2.0.0
short-title: ExperIA Enterprise OS — Inteligência Operacional Agêntica (WAAS)
description: >
  Squad completo para operação inteligente de clínicas via modelo WAAS
  (Workforce as a Service). Orquestra 9 Puppets especializados sob governança
  unificada Orion → Master of Puppets → Puppets. Foco em Sprint 14D (Turno de
  Receita), expansão modular, agenda cheia, previsibilidade, compliance LGPD
  e auto-evolução contínua.
author: Gabriel (ExperIA)
license: UNLICENSED
slashPrefix: experia

aios:
  minVersion: "2.1.0"
  type: squad

components:
  agents:
    - experia-master.md
    - experia-architect.md
    - experia-copy.md
    - experia-data.md
    - experia-security.md
    - experia-automations.md
    - experia-integrations.md
    - experia-validator.md
    - experia-marketing.md
  tasks:
    # Operacionais (herdados)
    - onboard-clinic.md
    - diagnose-bottleneck.md
    - create-wa-scripts.md
    - define-metrics.md
    - security-assessment.md
    - build-automation.md
    - design-integration.md
    - validate-release.md
    # Baseados no Negócio (novos v2)
    - sprint-14d-setup.md
    - generate-weekly-report.md
    - sales-call-prep.md
    - module-expansion.md
    - instagram-kit.md
    - office-kit.md
  workflows:
    # Herdados
    - clinic-onboarding.md
    - review-loop.md
    # Novos v2
    - sprint-14d-workflow.md
    - expansion-workflow.md
    - self-innovation-workflow.md
  checklists:
    - pre-deploy-checklist.md
    - lgpd-gate-checklist.md
  templates:
    # Herdados
    - clinic-brief-tmpl.md
    - wa-script-tmpl.md
    - metrics-report-tmpl.md
    # Novos v2
    - sprint-14d-briefing-tmpl.md
    - sales-call-script-tmpl.md
    - expansion-proposal-tmpl.md
  data:
    - experia-kb.md
  tools: []
  scripts: []

config:
  extends: extend
  coding-standards: config/coding-standards.md
  tech-stack: config/tech-stack.md
  governance: config/governance.yaml

dependencies:
  node: []
  python: []
  squads: []

tags:
  - clinicas
  - saude
  - whatsapp
  - lgpd
  - operacoes
  - vendas
  - agendamento
  - experia
  - waas
  - workforce-as-a-service
  - sprint-14d
