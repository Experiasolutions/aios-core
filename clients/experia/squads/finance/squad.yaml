name: finance
version: 1.0.0
short-title: Squad Finance — Faturamento, Cobrança & Cashflow (Experia)
description: >
  Departamento Financeiro com 8 agentes especializados em faturamento,
  cobrança, conciliação, cashflow e reporting financeiro para clínicas.
author: Gabriel (Experia)
license: UNLICENSED
slashPrefix: finance

aios:
  minVersion: "2.1.0"
  type: squad

components:
  agents:
    - finance-head.md
    - billing-manager.md
    - invoice-generator.md
    - payment-processor.md
    - collection-agent.md
    - reconciliation.md
    - cashflow-analyst.md
    - financial-reporter.md
  tasks:
    - generate-invoice.md
    - process-payment.md
    - collect-overdue.md
    - reconcile-accounts.md
    - cashflow-forecast.md
  workflows:
    - billing-cycle-workflow.md
    - collection-workflow.md
  templates:
    - invoice-tmpl.md
    - collection-tmpl.md
    - financial-report-tmpl.md
  checklists:
    - month-end-close-checklist.md
  tools: []
  scripts: []

config:
  extends: extend

dependencies:
  squads:
    - patient-ops
    - analytics
    - admin

tags:
  - finance
  - billing
  - collection
  - cashflow
  - reporting
  - experia
