name: produto
version: 1.0.0
short-title: Squad Produto — Roadmap e Inovação
description: >
  Squad responsável por definição de roadmap, priorização de features,
  validação de hipóteses, criação de conteúdo de produto e lançamentos.
  Recebe feedback do CS e entrega produto pronto para Marketing e Vendas.
author: Gabriel (Olympus)
license: UNLICENSED
slashPrefix: produto

aios:
  minVersion: "2.1.0"
  type: squad

components:
  agents:
    - produto-head.md
    - produto-pm.md
    - produto-creator.md
  tasks:
    - discovery-oportunidade.md
    - spec-feature.md
    - create-content.md
    - launch-product.md
    - collect-feedback.md
  workflows:
    - product-creation-workflow.md
  checklists:
    - launch-readiness.md
  templates:
    - feature-spec-tmpl.md
    - launch-plan-tmpl.md
  tools: []
  scripts: []
  data: []

config:
  extends: extend
  coding-standards: config/coding-standards.md

dependencies:
  squads:
    - cs
    - marketing
    - ops

tags:
  - produto
  - roadmap
  - features
  - lancamento
  - conteudo
