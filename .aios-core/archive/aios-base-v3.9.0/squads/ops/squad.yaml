name: ops
version: 1.0.0
short-title: Squad OPS — Arquiteto da Organização
description: >
  Squad responsável por definir processos, garantir coordenação entre squads,
  mapear fluxos, criar automações e validar qualidade via Quality Gates.
  OPS é o Arquiteto — os outros squads são os construtores.
author: Gabriel (Olympus)
license: UNLICENSED
slashPrefix: ops

aios:
  minVersion: "2.1.0"
  type: squad

components:
  agents:
    - ops-head.md
    - ops-mapper.md
    - ops-architect.md
    - ops-automation.md
    - ops-qa.md
  tasks:
    - map-process.md
    - design-architecture.md
    - build-automation.md
    - run-quality-gate.md
  workflows:
    - build-process-workflow.md
  checklists:
    - quality-gate-70.md
  templates:
    - process-map-tmpl.md
  tools: []
  scripts: []

config:
  extends: extend

dependencies:
  squads: []

tags:
  - ops
  - processos
  - automacao
  - quality-gate
  - arquitetura
