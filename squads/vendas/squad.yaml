name: vendas
version: 1.0.0
short-title: Squad Vendas — Pipeline e Fechamento
description: >
  Squad responsável pelo pipeline de vendas, prospecção, qualificação
  de leads e fechamento de negócios. Recebe MQLs do Marketing e
  entrega clientes fechados para Customer Success.
author: Gabriel (Olympus)
license: UNLICENSED
slashPrefix: vendas

aios:
  minVersion: "2.1.0"
  type: squad

components:
  agents:
    - vendas-head.md
    - vendas-sdr.md
    - vendas-closer.md
  tasks:
    - score-lead.md
    - qualify-lead.md
    - discovery-call.md
    - close-deal.md
  workflows:
    - sales-pipeline-workflow.md
  templates:
    - lead-scoring-tmpl.md
    - proposal-tmpl.md
  tools: []
  scripts: []

config:
  extends: extend

dependencies:
  squads:
    - marketing
    - ops

tags:
  - vendas
  - pipeline
  - leads
  - fechamento
  - sdr
  - closer
