name: cs
version: 1.0.0
short-title: Squad Customer Success — Jornada do Cliente
description: >
  Squad responsável pela jornada pós-venda: onboarding, suporte,
  retenção, health check, upsell e prevenção de churn.
  Recebe clientes do Squad Vendas e gera feedback para Produto.
author: Gabriel (Olympus)
license: UNLICENSED
slashPrefix: cs

aios:
  minVersion: "2.1.0"
  type: squad

components:
  agents:
    - cs-head.md
    - cs-suporte.md
    - cs-retencao.md
    - cs-health.md
    - cs-engagement.md
    - cs-upsell.md
    - cs-churn.md
  tasks:
    - onboard-client.md
    - resolve-ticket.md
    - health-check.md
    - detect-upsell.md
    - prevent-churn.md
  workflows:
    - customer-journey-workflow.md
  templates:
    - onboarding-brief-tmpl.md
  checklists:
    - onboarding-checklist.md
  tools: []
  scripts: []

config:
  extends: extend

dependencies:
  squads:
    - vendas
    - ops

tags:
  - customer-success
  - suporte
  - retencao
  - onboarding
  - churn
  - upsell
  - nps
