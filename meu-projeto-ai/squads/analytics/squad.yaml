name: analytics
version: 1.0.0
short-title: Squad Analytics — BI, Predições & Dashboards (Experia)
description: >
  Departamento de Analytics com 9 agentes especializados em BI,
  análise de dados, modelos preditivos e dashboards operacionais.
author: Gabriel (Experia)
license: UNLICENSED
slashPrefix: analytics

aios:
  minVersion: "2.1.0"
  type: squad

components:
  agents:
    - analytics-head.md
    - data-engineer.md
    - data-quality.md
    - bi-analyst.md
    - dashboard-builder.md
    - report-generator.md
    - predictive-modeler.md
    - churn-predictor.md
    - demand-forecaster.md
  tasks:
    - build-dashboard.md
    - create-report.md
    - train-model.md
    - forecast-demand.md
  workflows:
    - data-pipeline-workflow.md
    - reporting-workflow.md
  templates:
    - dashboard-tmpl.md
    - report-tmpl.md
  tools: []
  scripts: []

config:
  extends: extend

dependencies:
  squads:
    - patient-ops
    - clinical
    - finance

tags:
  - analytics
  - bi
  - dashboards
  - predictions
  - data
  - experia
